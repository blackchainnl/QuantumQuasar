description "Blackcoin Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env QQD_BIN="/usr/bin/blackcoind"
env QQD_USER="blackcoin"
env QQD_GROUP="blackcoin"
env QQD_PIDDIR="/var/run/blackcoind"
# upstart can't handle variables constructed with other variables
env QQD_PIDFILE="/var/run/blackcoind/blackcoind.pid"
env QQD_CONFIGFILE="/etc/blackcoin/blackcoin.conf"
env QQD_DATADIR="/var/lib/blackcoind"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # blackcoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$QQD_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run blackcoind."
        echo "The setting must appear in $QQD_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Blackcoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$QQD_PIDDIR"
    chmod 0755 "$QQD_PIDDIR"
    chown $QQD_USER:$QQD_GROUP "$QQD_PIDDIR"
    chown $QQD_USER:$QQD_GROUP "$QQD_CONFIGFILE"
    chmod 0660 "$QQD_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$QQD_PIDFILE" \
    --chuid $QQD_USER:$QQD_GROUP \
    --exec "$QQD_BIN" \
    -- \
    -pid="$QQD_PIDFILE" \
    -conf="$QQD_CONFIGFILE" \
    -datadir="$QQD_DATADIR" \
    -disablewallet \
    -daemon
